# Local kind overrides for testing unmerged workspace changes.
# Use with values-dev.yaml:
#   helm upgrade --install ... -f values-dev.yaml -f values-kind-local.yaml

gateway:
  image:
    repository: unrelated-mcp-gateway
    tag: kind
    pullPolicy: IfNotPresent
  managedMcp:
    backendMode: k8s
  migrations:
    image:
      repository: unrelated-mcp-gateway-migrator
      tag: kind
      pullPolicy: IfNotPresent

gatewayui:
  image:
    repository: unrelated-mcp-gateway-ui
    tag: kind
    pullPolicy: IfNotPresent

operator:
  image:
    repository: unrelated-mcp-gateway-operator
    tag: kind
    pullPolicy: IfNotPresent
  managedDeployments:
    mode: k8s

managedFixtures:
  enabled: true
  auth:
    adminToken:
      value: dev-admin-token
  deployables:
    - id: real-stdio-aggregation
      displayName: Real Stdio Aggregation
      description: Two stdio MCP backends via Adapter (kind fixture)
      image: unrelated-mcp-managed-stdio-aggregation:kind
      defaultUpstreamUrl: http://managed:8080/mcp
      enabled: true
    - id: real-stdio-smoke
      displayName: Real Stdio Smoke
      description: Single stdio MCP backend via Adapter (kind fixture)
      image: unrelated-mcp-managed-stdio-smoke:kind
      defaultUpstreamUrl: http://managed:8080/mcp
      enabled: true
