apiVersion: v2
name: unrelated-mcp-gateway-stack
description: Umbrella chart for operator + gateway + UI (+ optional postgres).
type: application
version: 0.2.0
appVersion: "0.12.0"
dependencies:
  - name: unrelated-mcp-gateway-operator
    version: 0.2.0
    repository: file://../unrelated-mcp-gateway-operator
    alias: operator
    condition: operator.enabled
  - name: unrelated-mcp-gateway
    version: 0.2.0
    repository: file://../unrelated-mcp-gateway
    alias: gateway
    condition: gateway.enabled
  - name: unrelated-mcp-gateway-ui
    version: 0.2.0
    repository: file://../unrelated-mcp-gateway-ui
    alias: gatewayui
    condition: gatewayui.enabled
  - name: unrelated-mcp-postgres
    version: 0.2.0
    repository: file://../unrelated-mcp-postgres
    alias: postgres
    condition: postgres.enabled
  - name: unrelated-mcp-gateway-managed-fixtures
    version: 0.2.0
    repository: file://../unrelated-mcp-gateway-managed-fixtures
    alias: managedFixtures
    condition: managedFixtures.enabled
