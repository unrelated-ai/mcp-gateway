apiVersion: v1
kind: Service
metadata:
  name: {{ include "unrelated-mcp-gateway-ui.fullname" . }}
  labels:
{{ include "unrelated-mcp-gateway-ui.labels" . | indent 4 }}
{{- with .Values.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
{{ include "unrelated-mcp-gateway-ui.selectorLabels" . | indent 4 }}
