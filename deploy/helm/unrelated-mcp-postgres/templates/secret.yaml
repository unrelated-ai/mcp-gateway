{{- if not .Values.auth.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "unrelated-mcp-postgres.secretName" . }}
  labels:
{{ include "unrelated-mcp-postgres.labels" . | indent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.auth.password | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
{{- end }}
