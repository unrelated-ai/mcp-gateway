apiVersion: v1
kind: Service
metadata:
  name: {{ include "unrelated-mcp-gateway.adminServiceName" . }}
  labels:
{{ include "unrelated-mcp-gateway.labels" . | indent 4 }}
{{- with .Values.service.admin.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.admin.type }}
  ports:
    - name: admin
      port: {{ .Values.service.admin.port }}
      targetPort: admin
      protocol: TCP
  selector:
{{ include "unrelated-mcp-gateway.selectorLabels" . | indent 4 }}
