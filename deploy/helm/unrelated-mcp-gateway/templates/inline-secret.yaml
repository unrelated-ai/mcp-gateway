{{- $postgresHost := .Values.postgres.fullnameOverride | default "unrelated-mcp-postgres" -}}
{{- $autoDatabaseUrl := "" -}}
{{- if and .Values.postgres.enabled (eq (.Values.database.existingSecret.name | default "") "") (not .Values.database.url) (eq (.Values.postgres.auth.existingSecret.name | default "") "") -}}
{{- $autoDatabaseUrl = printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.postgres.auth.username .Values.postgres.auth.password $postgresHost (.Values.postgres.service.port | int) .Values.postgres.auth.database -}}
{{- end -}}
{{- $resolvedDatabaseUrl := .Values.database.url | default $autoDatabaseUrl -}}
{{- $hasInline := or $resolvedDatabaseUrl (or .Values.auth.adminToken.value (or .Values.session.secret.value .Values.session.secretKeys.value)) -}}
{{- if $hasInline }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "unrelated-mcp-gateway.inlineSecretName" . }}
  labels:
{{ include "unrelated-mcp-gateway.labels" . | indent 4 }}
type: Opaque
stringData:
  {{- if $resolvedDatabaseUrl }}
  UNRELATED_GATEWAY_DATABASE_URL: {{ $resolvedDatabaseUrl | quote }}
  {{- end }}
  {{- if .Values.auth.adminToken.value }}
  UNRELATED_GATEWAY_ADMIN_TOKEN: {{ .Values.auth.adminToken.value | quote }}
  {{- end }}
  {{- if .Values.session.secret.value }}
  UNRELATED_GATEWAY_SESSION_SECRET: {{ .Values.session.secret.value | quote }}
  {{- end }}
  {{- if .Values.session.secretKeys.value }}
  UNRELATED_GATEWAY_SECRET_KEYS: {{ .Values.session.secretKeys.value | quote }}
  {{- end }}
{{- end }}
